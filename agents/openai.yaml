interface:
  display_name: "Video to Summary"
  short_description: "Acquire video content via direct download or browser interaction, then draft transcript-backed notes"
  default_prompt: "Use $video-to-summary to get a transcript-backed summary from this video source. If direct download fails, route through $web-access and CDP, then feed the extracted media or transcript back into $video-to-summary."
